# ── App Base URL ──────────────────────────────────────────────────
# __ Cloudflare R2 Cloud Storage ________________________________
# Set these env vars on the server to enable cloud storage.
# If NOT set, uploads fall back to local disk automatically.
# How to get these: Cloudflare Dashboard → R2 → Create Bucket → API Tokens
#
# R2_ACCESS_KEY_ID      — from R2 API Token
# R2_SECRET_ACCESS_KEY  — from R2 API Token
# R2_ACCOUNT_ID         — from Cloudflare dashboard URL (32-char hex)
# R2_BUCKET_NAME        — name of your R2 bucket (e.g. rediscoveru)
# R2_PUBLIC_URL         — public bucket URL (e.g. https://pub-xxx.r2.dev)
#                         Enable in R2 bucket → Settings → Public Access
r2.access.key.id=${R2_ACCESS_KEY_ID:}
r2.secret.access.key=${R2_SECRET_ACCESS_KEY:}
r2.account.id=${R2_ACCOUNT_ID:}
r2.bucket.name=${R2_BUCKET_NAME:rediscoveru}
r2.public.url=${R2_PUBLIC_URL:}

# __ App Base URL ______________________________________________
