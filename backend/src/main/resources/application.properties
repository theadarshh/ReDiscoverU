# ═══════════════════════════════════════════════════════════
#  ReDiscoverU — application.properties
#  All sensitive values come from environment variables.
#  Defaults shown are for LOCAL development only.
#  On Render/Railway: set these as environment variables.
# ═══════════════════════════════════════════════════════════

# ── Database ─────────────────────────────────────────────────
# Local default → override via DB_URL env var on production
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/rediscoveru?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-test-query=SELECT 1

# ── JPA ──────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ── JWT ──────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:ReDiscoverU_ChangeInProd_LongSecret_Min32Chars_Jayashankar2024}
jwt.expiration=${JWT_EXPIRY:86400000}

# ── Razorpay ─────────────────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:placeholder_secret}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:placeholder_webhook}

# ── Mail (Gmail SMTP) ────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply@example.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.test-connection=false

# ── Admin seed ────────────────────────────────────────────────
admin.email=${ADMIN_EMAIL:admin@rediscoveru.life}
admin.password=${ADMIN_PASSWORD:Admin@2024}
admin.name=${ADMIN_NAME:Jayashankar Lingaiah}

# ── Server ────────────────────────────────────────────────────
# PORT is set automatically by Render/Railway
server.port=${PORT:8080}
spring.application.name=rediscoveru

# ── OTP ───────────────────────────────────────────────────────
otp.expiry.minutes=5

# ── File Upload ───────────────────────────────────────────────
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
# On production: uploads go to /opt/render/project/uploads or similar
file.upload.dir=${FILE_UPLOAD_DIR:uploads}

# ── App Base URL (used in email links) ───────────────────────
app.base.url=${APP_BASE_URL:http://localhost:5500}

# ── Payment config encryption key ────────────────────────────
payment.config.encryption.key=${PAYMENT_CONFIG_ENCRYPTION_KEY:ReDiscoverU_PayCfg_ChangeInProd_2024}

# ── Logging ───────────────────────────────────────────────────
logging.level.com.rediscoveru=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.com.zaxxer.hikari=WARN
logging.pattern.console=%d{HH:mm:ss} [%-5level] %-25logger{25} - %msg%n
